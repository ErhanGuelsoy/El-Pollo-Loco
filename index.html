<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pollo Loco</title>

    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="stylesheet" href="style.css">

    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/cloud.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="levels/level1.js"></script> 
    <script src="js/game.js"></script>
</head>

<body onload="init()">

    <h1>El Pollo Loco</h1>

    <div id="gameContainer">

        <!-- GAME AREA -->
        <div class="game-area">

            <!-- STARTSCREEN -->
            <div id="start_game" onclick="startGame()">
                <img src="img/9_intro_outro_screens/start/startscreen_1.png" alt="start screen">
            </div>

            <!-- CANVAS -->
            <canvas id="canvas" width="720" height="480"></canvas>

        </div>

        <!-- BUTTONS -->
        <div class="controls-bottom">

            <!-- LINKS -->
            <div class="control-panel left-panel">
                <button id="btnLeft" class="control-btn">←</button>
                <button id="btnRight" class="control-btn">→</button>
            </div>

            <!-- RECHTS -->
            <div class="control-panel right-panel">
                <button id="jumpBTN" class="control-btn">↑</button>
                <!-- 🔥 neuer Pfeil -->
                <button id="throw" class="control-btn">↘</button>
            </div>

        </div>

    </div>

</body>
</html>
